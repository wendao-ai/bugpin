name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'  # Matches both production (v1.0.0) and dev (v1.0.0-dev) tags
  workflow_dispatch:  # Allows manual triggering

env:
  REGISTRY: zot.migelab.com
  IMAGE_NAME: bugpin

jobs:
  build-and-push:
    # Runner 切换：默认 self-hosted Linux X64（cw-linux-x64）；在仓库 Settings → Variables 设 RUNNER_LABELS=["ubuntu-latest"] 可一键切回 GitHub runner
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["self-hosted","Linux","X64"]') }}
    # Runs on: version tags only (v1.0.0 for production, v1.0.0-dev for development)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if dev or beta tag
        id: check
        run: |
          if [[ "${{ github.ref_name }}" == *-dev || "${{ github.ref_name }}" == *-beta* ]]; then
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # self-hosted（CN）→ docker driver：默认 docker-container 的 BuildKit 容器有独立网络栈，
          #   不继承宿主 /etc/docker/daemon.json 的 registry mirrors，拉基础镜像（oven/bun:1-alpine）超时；
          #   切 docker driver 直接用宿主 daemon，复用宿主的镜像加速配置。
          # github-hosted（Azure）→ docker-container driver（默认）：Azure 直连 Docker Hub 无网络问题，
          #   保留默认 driver 才能用 BuildKit 高级特性（多平台、cache export 等）。
          # 详见 mige-lims-jeecgboot/docs/solutions/integration-issues/self-hosted-runner-and-zot-registry-pitfalls-2026-05-17.md
          driver: ${{ runner.environment == 'self-hosted' && 'docker' || 'docker-container' }}

      - name: Log in to Zot Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # For production tags (v1.0.0) -> 1.0.0, latest
            type=semver,pattern={{version}},enable=${{ steps.check.outputs.is_dev == 'false' }}
            type=raw,value=latest,enable=${{ steps.check.outputs.is_dev == 'false' }}
            # For dev/beta tags (v1.0.1-dev, v1.0.1-beta.1) -> <version>, dev
            type=match,pattern=v(.*),group=1,enable=${{ steps.check.outputs.is_dev == 'true' }}
            type=raw,value=dev,enable=${{ steps.check.outputs.is_dev == 'true' }}
          labels: |
            org.opencontainers.image.title=BugPin
            org.opencontainers.image.description=Self-hosted bug reporting and feedback widget
            org.opencontainers.image.vendor=Arantic Digital

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # USE_CN_MIRRORS：仅 self-hosted runner（CN 网络）→ true，启用 Alpine/npm 国内镜像加速；
          # GitHub-hosted runner（ubuntu-latest 等，在 Azure 国际网络）→ false，走官方源
          # runner.environment 由 GitHub 在运行时注入，值为 'self-hosted' 或 'github-hosted'，不依赖 label 命名
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            USE_CN_MIRRORS=${{ runner.environment == 'self-hosted' && 'true' || 'false' }}
          # provenance=false：避免 buildx 产出 OCI attestation manifest，Zot 收到非 OCI manifest 会返回 HTTP 415 "manifest invalid"
          # 配合 Zot 服务端 "compat": ["docker2s2"] 配置才能完全消除 415
          provenance: false
          # GHA cache 仅在 github-hosted runner 上启用：
          # - github-hosted：cache backend 与 runner 同机房，又快又稳，能复用历史 layer
          # - self-hosted：cache backend 经常 503，且需走 HTTPS 出网（GFW），改用宿主 Docker 自带 layer cache
          cache-from: ${{ runner.environment == 'github-hosted' && 'type=gha' || '' }}
          cache-to: ${{ runner.environment == 'github-hosted' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64  # Add linux/arm64 if needed

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

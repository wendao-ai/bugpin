name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'  # Matches both production (v1.0.0) and dev (v1.0.0-dev) tags
  workflow_dispatch:  # Allows manual triggering

env:
  REGISTRY: zot.migelab.com
  IMAGE_NAME: bugpin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Runs on: version tags only (v1.0.0 for production, v1.0.0-dev for development)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if dev or beta tag
        id: check
        run: |
          if [[ "${{ github.ref_name }}" == *-dev || "${{ github.ref_name }}" == *-beta* ]]; then
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Zot Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # For production tags (v1.0.0) -> 1.0.0, latest
            type=semver,pattern={{version}},enable=${{ steps.check.outputs.is_dev == 'false' }}
            type=raw,value=latest,enable=${{ steps.check.outputs.is_dev == 'false' }}
            # For dev/beta tags (v1.0.1-dev, v1.0.1-beta.1) -> <version>, dev
            type=match,pattern=v(.*),group=1,enable=${{ steps.check.outputs.is_dev == 'true' }}
            type=raw,value=dev,enable=${{ steps.check.outputs.is_dev == 'true' }}
          labels: |
            org.opencontainers.image.title=BugPin
            org.opencontainers.image.description=Self-hosted bug reporting and feedback widget
            org.opencontainers.image.vendor=Arantic Digital

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64  # Add linux/arm64 if needed

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

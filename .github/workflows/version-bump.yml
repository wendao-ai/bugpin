name: Bump package.json versions

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  bump-version:
    # Runner 切换：默认 self-hosted Linux X64（cw-linux-x64）；在仓库 Settings → Variables 设 RUNNER_LABELS=["ubuntu-latest"] 可一键切回 GitHub runner
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["self-hosted","Linux","X64"]') }}
    permissions:
      contents: write

    steps:
      # 先确定目标分支再 checkout，避免在 base_ref 上 commit、推到 target 时被拒（dev/main 历史不一致）
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Determine target branch
        id: branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if echo "$VERSION" | grep -qE '(-dev|-beta)'; then
            echo "target=dev" >> "$GITHUB_OUTPUT"
          else
            echo "target=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if bump needed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions in package.json files
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for PKG in package.json src/server/package.json src/admin/package.json; do
            node -e "
              const fs = require('fs');
              const j = JSON.parse(fs.readFileSync('$PKG'));
              j.version = '$VERSION';
              fs.writeFileSync('$PKG', JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/server/package.json src/admin/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ steps.branch.outputs.target }}

name: Deploy to Production (Alibaba Cloud ECS)

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    # Runner 切换：默认 self-hosted Linux X64（cw-linux-x64）；在仓库 Settings → Variables 设 RUNNER_LABELS=["ubuntu-latest"] 可一键切回 GitHub runner
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["self-hosted","Linux","X64"]') }}
    # Only run when docker-publish succeeded on a production tag (no -dev / -beta suffix)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_branch, '-dev') &&
      !contains(github.event.workflow_run.head_branch, '-beta')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: ZOT_USERNAME,ZOT_PASSWORD,IMAGE
          command_timeout: 30m
          script: |
            echo "$ZOT_PASSWORD" | docker login zot.migelab.com -u "$ZOT_USERNAME" --password-stdin
            docker pull "$IMAGE"
            docker stop bugpin || true
            docker rm   bugpin || true
            docker ps -q --filter "publish=7300" | xargs -r docker stop 2>/dev/null || true
            docker ps -aq --filter "publish=7300" | xargs -r docker rm  2>/dev/null || true
            mkdir -p /opt/bugpin/data && chown -R 1000:1000 /opt/bugpin/data
            docker run -d \
              --name bugpin \
              --restart unless-stopped \
              -p 7300:7300 \
              -v /opt/bugpin/data:/data \
              "$IMAGE"
            docker logout zot.migelab.com
        env:
          ZOT_USERNAME: ${{ secrets.ZOT_USERNAME }}
          ZOT_PASSWORD: ${{ secrets.ZOT_PASSWORD }}
          IMAGE: zot.migelab.com/bugpin:latest
